#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;
  text-align:center;line-height:1.5;

.sb-brand .sb-brand-line2{display:block;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;color:var(--gold);opacity:.6;margin-top:3px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;}
.sb-vol{font-family:"Noto Sans TC",sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;

.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;width:100%;

.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-item.active{background:rgba(184,134,11,.22);box-shadow:0 0 14px rgba(184,134,11,.35) inset;}
.sb-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;

  font-size:16px;font-weight:600;transition:all .2s;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:12px;letter-spacing:.4px;
  color:var(--sbText);opacity:.86;text-align:center;}
#sbToggle{display:none;}

/* ===== main ===== */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;overflow:hidden;background:var(--headGrad);color:#fff;
  text-align:center;padding:64px 24px 56px;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);

.hero-inner{position:relative;z-index:2;max-width:920px;margin:0 auto;}
.hero-tag{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:8px;color:var(--goldL);margin-bottom:18px;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:4px;color:#fff;margin:0 0 18px;}
.hero-subtitle{font-size:20px;line-height:1.9;color:#e8dcc4;max-width:780px;margin:0 auto 22px;font-weight:400;}
.hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:18px;color:var(--goldL);letter-spacing:2px;}
.hero-range{font-family:"Noto Sans TC",sans-serif;font-size:17px;color:#cdbd9a;letter-spacing:1.5px;margin-top:12px;}
.hero-eng{font-family:Georgia,serif;font-style:italic;font-size:15px;color:#b6a884;margin-top:14px;letter-spacing:1px;}

/* ===== preface ===== */
.preface{max-width:880px;margin:48px auto 8px;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;font-weight:700;color:var(--accent);letter-spacing:3px;margin-bottom:22px;}
.preface-title::after{content:"";display:block;width:64px;height:3px;background:var(--gold);margin:14px auto 0;border-radius:2px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-align:justify;}

/* ===== 總目錄 ===== */
.toc-section{max-width:1100px;margin:42px auto 16px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;font-weight:700;color:var(--accent);letter-spacing:8px;margin-bottom:8px;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:17px;color:var(--text-muted);letter-spacing:1.5px;margin-bottom:30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;}
.toc-card{display:flex;align-items:flex-start;gap:18px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:22px 24px;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;
  box-shadow:0 2px 8px rgba(91,58,41,.05);}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(91,58,41,.14);border-color:var(--gold);}
.toc-num{flex:0 0 auto;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;font-size:22px;font-weight:700;}
.toc-body{flex:1;}
.toc-name{font-size:21px;font-weight:700;color:var(--accent);line-height:1.5;margin-bottom:6px;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:14.5px;color:var(--text-muted);line-height:1.7;}

/* ===== 章節 ===== */
.chapter{max-width:1080px;margin:36px auto 0;padding:0 20px;scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;padding:40px 28px 34px;border-radius:14px 14px 0 0;position:relative;}
.ch-head::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120px;height:3px;background:var(--gold);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:4px;color:var(--goldL);margin-bottom:12px;}
.ch-name{font-size:36px;font-weight:900;letter-spacing:2px;color:#fff;margin:0 0 10px;}
.ch-sub{font-size:17px;color:#cdbd9a;font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;}
.ch-body{background:#fffdf7;border:1px solid var(--border);border-top:0;border-radius:0 0 14px 14px;padding:30px 26px 26px;}
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin:8px 0 6px;font-family:"Noto Sans TC",sans-serif;font-size:17px;color:var(--accent);
  font-weight:500;letter-spacing:1px;cursor:pointer;transition:color .2s;}
.next-link:hover{color:var(--gold);}
.vol-close{max-width:880px;margin:34px auto 0;padding:24px 28px;background:linear-gradient(135deg,#fdf8e8,#f2e6c8);

.vol-close .bridge-label{background:var(--accent);}
.vol-close p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}

  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}

.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;border-radius:50%;border:0;
  background:var(--accent);color:#fff;font-size:20px;cursor:pointer;z-index:120;opacity:0;
  pointer-events:none;transition:opacity .3s;box-shadow:0 4px 14px rgba(0,0,0,.25);}
#backTop.show{opacity:1;pointer-events:auto;}

@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  #sbToggle{display:flex;align-items:center;justify-content:center;position:fixed;left:14px;top:14px;
    width:44px;height:44px;border-radius:10px;border:0;background:var(--sbBg);color:var(--goldL);
    font-size:20px;z-index:130;cursor:pointer;}
  .hero-title{font-size:38px;}.hero-subtitle{font-size:17px;}
  .ch-name{font-size:26px;}.toc-title{font-size:26px;}.preface-title{font-size:24px;}
  .chapter,.toc-section,.preface{padding-left:16px;padding-right:16px;}
}

<button aria-label="回到頂部" id="backTop">↑</button>
<script>
/* 側欄回頂 */
var sbBrand=document.getElementById('sbBrand');
if(sbBrand){sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});}
/* 漢堡 */
var sb=document.getElementById('sb'),sbToggle=document.getElementById('sbToggle');
if(sbToggle){sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});}
/* 回頂鈕 */
var backTop=document.getElementById('backTop');
if(backTop){backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});}

/* 進度條 */
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
  if(backTop)backTop.classList.toggle('show',window.scrollY>600);
}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();

/* iframe 自動高度 */
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}else{f.addEventListener('load',tick);}
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

/* 錨點防錯跳 */
document.addEventListener('click',function(e){
  var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);var el=document.getElementById(id);if(!el)return;
  e.preventDefault();resizeAllFrames();
  setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;window.scrollTo({top:y,behavior:'smooth'});},60);
},true);

/* 持續輪詢 */
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

/* 側欄 active 高亮 */
function highlight(){
  var items=document.querySelectorAll('.sb-item');var secs=document.querySelectorAll('section.chapter');
  var idx=-1;
  for(var i=0;i<secs.length;i++){if(secs[i].getBoundingClientRect().top<window.innerHeight*0.35)idx=i;}
  items.forEach(function(it,i){it.classList.toggle('active',i===idx);});
}
window.addEventListener('scroll',highlight,{passive:true});highlight();

/* 接近頁尾淡出膠囊 */
(function(){
  var cap=document.getElementById('readProgress');if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];var f2=document.querySelector('.site-footer');if(f2)targets.push(f2);
  if(!targets.length)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){var any=entries.some(function(e){return e.isIntersecting;});setHide(any);},
      {root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  }else{
    var check=function(){var dh=document.documentElement.scrollHeight;var sbm=window.scrollY+window.innerHeight;setHide(dh-sbm<240);};
    window.addEventListener('scroll',check,{passive:true});check();
  }
})();

/* 外層防複製 */
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-79-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
