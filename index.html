<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<meta content="noai, noimageai, noindex, nofollow" name="robots"/>
<title>大智度論 · 卷七十九 · 第 1-2 品 彙整本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:88px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-user-drag:none;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:20px;line-height:1.85;-webkit-font-smoothing:antialiased;
}

/* ==== Sidebar ==== */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11.5px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13.5px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10.5px;opacity:.55;margin-top:2px;}

.sb-nav{display:flex;flex-direction:column;gap:14px;align-items:center;width:100%;padding:14px 0 0;}
.sb-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:6px 4px;text-decoration:none;color:var(--sbText);
  width:74px;border-radius:8px;transition:all .25s;cursor:pointer;}
.sb-circle{width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(212,196,168,.08);border:1px solid rgba(212,196,168,.3);
  font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:600;
  color:var(--sbText);transition:all .25s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:12px;line-height:1.3;text-align:center;
  letter-spacing:.5px;opacity:.85;max-width:72px;}
.sb-item:hover .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);}
.sb-item:hover .sb-label{opacity:1;color:var(--goldL);}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);
  box-shadow:0 0 12px rgba(184,134,11,.55);}
.sb-item.active .sb-label{color:var(--goldL);font-weight:600;}

#sbToggle{display:none;position:fixed;top:12px;left:12px;z-index:120;
  width:42px;height:42px;border:none;border-radius:8px;background:var(--sbBg);color:var(--gold);
  font-size:22px;cursor:pointer;}

/* ==== Read progress（底部置中膠囊）==== */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}

/* ==== Main ==== */
.main{margin-left:var(--sbW);padding:0;}

/* ==== Hero ==== */
.site-hero{position:relative;padding:90px 32px 80px;text-align:center;
  background:linear-gradient(135deg,#1a1610 0%,#2a2218 30%,#3d3225 60%,#2a2218 90%,#1a1610 100%);
  color:#f0e8d8;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:380px;font-weight:900;color:rgba(212,196,168,.04);
  letter-spacing:30px;font-family:"Noto Serif TC",serif;
  pointer-events:none;white-space:nowrap;}
.hero-content{position:relative;z-index:2;max-width:920px;margin:0 auto;}
.hero-eyebrow{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  letter-spacing:6px;color:var(--goldL);opacity:.85;margin-bottom:14px;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:8px;color:var(--goldL);
  text-shadow:0 2px 24px rgba(0,0,0,.45);position:relative;line-height:1.25;margin-bottom:14px;}
.hero-subtitle{font-size:20px;font-weight:400;letter-spacing:6px;color:#e6d8b5;
  margin:18px 0 14px;position:relative;line-height:1.7;}
.hero-sub{font-size:18px;color:#d4c4a8;letter-spacing:3px;line-height:1.9;position:relative;margin-top:14px;}
.hero-meta{font-size:18px;color:#d4c4a8;letter-spacing:3px;margin-top:18px;line-height:1.9;position:relative;}
.hero-range{display:inline-block;font-size:17px;color:var(--goldL);letter-spacing:4px;
  margin-top:22px;padding:8px 22px;border:1px solid rgba(212,168,75,.4);
  border-radius:30px;position:relative;}
.hero-skt{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  color:rgba(212,168,75,.5);letter-spacing:3px;margin-top:24px;
  font-style:normal;position:relative;}

/* ==== Preface ==== */
.preface{max-width:1000px;margin:60px auto 30px;padding:0 32px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);letter-spacing:8px;
  margin-bottom:24px;font-weight:700;}
.preface-title::after{content:"";display:block;width:80px;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:14px auto 0;}
.preface p{font-size:19px;color:var(--text2);line-height:2.1;margin-bottom:18px;
  text-indent:2em;text-align:justify;}

/* ==== TOC ==== */
.toc-section{max-width:1100px;margin:50px auto 60px;padding:0 32px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);letter-spacing:8px;
  margin-bottom:14px;font-weight:700;}
.toc-title::after{content:"";display:block;width:80px;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:14px auto 0;}
.toc-desc{text-align:center;font-size:17px;color:var(--text-muted);
  letter-spacing:3px;margin-bottom:36px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
  gap:20px;}
.toc-card{display:flex;align-items:flex-start;gap:18px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:22px 26px;text-decoration:none;color:var(--text);
  transition:all .3s;box-shadow:0 2px 6px rgba(91,58,41,.05);}
.toc-card:hover{border-color:var(--gold);box-shadow:0 6px 22px rgba(184,134,11,.18);
  transform:translateY(-2px);}
.toc-num{flex-shrink:0;width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:600;
  letter-spacing:.5px;}
.toc-name{flex:1;font-size:19.5px;font-weight:600;color:var(--accent);line-height:1.7;}
.toc-name small{display:block;font-size:14px;font-weight:400;color:var(--text2);
  margin-top:6px;line-height:1.6;letter-spacing:.5px;}

/* ==== Chapter section（外層每品 wrapper）==== */
.chapter{margin:50px auto 0;max-width:1180px;padding:0 24px;}
.ch-head{background:var(--headGrad);color:#f0e8d8;border-radius:14px 14px 0 0;
  padding:46px 32px;text-align:center;position:relative;overflow:hidden;
  border-bottom:3px solid var(--gold);}
.ch-head::after{content:"";position:absolute;left:50%;bottom:14px;
  width:80px;height:1px;background:rgba(212,168,75,.4);
  transform:translateX(-50%);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;
  color:var(--goldL);letter-spacing:6px;margin-bottom:14px;opacity:.85;}
.ch-name{font-size:34px;font-weight:900;letter-spacing:6px;color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.35);line-height:1.3;}
.ch-sub{font-size:17px;color:#d4c4a8;letter-spacing:3px;
  margin-top:14px;line-height:1.8;font-weight:400;}

.ch-body{background:var(--bg);border-radius:0 0 14px 14px;
  padding:32px 0 24px;border:1px solid var(--border);border-top:0;}

/* ==== Bridge ==== */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:22px 28px;margin:0 24px 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 14px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:12px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;
  text-align:justify;}

/* ==== iframe ==== */
.ch-frame{display:block;width:calc(100% - 48px);margin:0 24px 8px;border:0;
  background:#fffdf7;border:1px solid var(--border);
  border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);
  min-height:180px;}

.next-link{display:block;margin:24px 24px 0;text-align:center;
  padding:14px;background:var(--gold);color:#fff;
  text-decoration:none;border-radius:10px;font-size:17px;letter-spacing:3px;
  font-family:"Noto Sans TC",sans-serif;transition:all .25s;}
.next-link:hover{background:var(--accent);transform:translateY(-1px);}

/* ==== Footer ==== */
.site-footer{margin-top:80px;padding:46px 24px;text-align:center;
  background:#1e1a14;color:#d4c4a8;}
.site-footer .ft-title{font-size:18px;color:var(--goldL);letter-spacing:5px;margin-bottom:10px;}
.site-footer p{font-size:15px;letter-spacing:2px;line-height:1.9;opacity:.85;}

/* ==== Back to top ==== */
#backTop{position:fixed;right:20px;bottom:90px;width:46px;height:46px;
  border-radius:50%;background:var(--accent);color:#fff;border:none;
  font-size:20px;cursor:pointer;z-index:110;display:none;
  box-shadow:0 4px 14px rgba(91,58,41,.3);}
#backTop.show{display:flex;align-items:center;justify-content:center;}

/* ==== 響應式 ==== */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.show{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .hero-title{font-size:38px;letter-spacing:4px;}
  .hero-subtitle{font-size:16px;letter-spacing:3px;}
  .ch-name{font-size:24px;letter-spacing:3px;}
  .toc-grid{grid-template-columns:1fr;}
  .chapter{padding:0 8px;}
  .bridge,.ch-frame,.next-link{margin-left:8px;margin-right:8px;}
  .ch-frame{width:calc(100% - 16px);}
}

/* ============ 1.2x 字級放大（buddhist-text-html 卷七十九）============ */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-sub,.site-hero .hero-sub,.hero-meta{font-size:18px!important;}
.hero-range{font-size:17px!important;}
.preface p,.preface-text p{font-size:19px!important;line-height:2.1!important;}
.preface h2,.preface-title{font-size:30px!important;}
.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.toc-num{font-size:17px!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub,.ch-desc,.ch-subtitle{font-size:17px!important;}
.next-link{font-size:17px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
.read-progress .rp-bar{width:148px!important;height:4px!important;}
.read-progress .rp-pct{font-size:13px!important;}
.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:17px!important;}
.sb-label{font-size:12px!important;}
.site-footer,.site-footer p{font-size:15px!important;}
</style>
</head>

<button aria-label="目錄" id="sbToggle">☰</button>
<div class="read-progress" id="readProgress">
<span class="rp-label">PROGRESS</span>
<div class="rp-bar"><div class="rp-fill" id="rpFill"></div></div>

<button aria-label="回到頂部" id="backTop">↑</button>
<script>
// 漢堡選單
var sb = document.getElementById('sb');
var sbToggle = document.getElementById('sbToggle');
if(sbToggle){
  sbToggle.addEventListener('click', function(){
    sb.classList.toggle('show');
  });
}
// sb-brand 回頂
var sbBrand = document.getElementById('sbBrand');
if(sbBrand){
  sbBrand.addEventListener('click', function(e){
    e.preventDefault();
    window.scrollTo({top:0, behavior:'smooth'});
  });
}
// 回到頂部按鈕
var bt = document.getElementById('backTop');
window.addEventListener('scroll', function(){
  if(window.scrollY > 600) bt.classList.add('show');
  else bt.classList.remove('show');
});
bt.addEventListener('click', function(){
  window.scrollTo({top:0, behavior:'smooth'});
});

// 進度條
var rpFill = document.getElementById('rpFill');
var rpPct  = document.getElementById('rpPct');
function updateProgress(){
  var sh = document.documentElement.scrollHeight - window.innerHeight;
  var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
  if(rpFill) rpFill.style.width = pct + '%';
  if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';
}
window.addEventListener('scroll', updateProgress, {passive:true});
updateProgress();

// 側欄高亮
var navItems = document.querySelectorAll('.sb-item');
function syncNav(){
  var chs = document.querySelectorAll('.chapter');
  var act = -1;
  chs.forEach(function(c, i){
    var r = c.getBoundingClientRect();
    if(r.top < window.innerHeight * 0.35) act = i;
  });
  navItems.forEach(function(it, i){
    if(i === act) it.classList.add('active');
    else it.classList.remove('active');
  });
}
window.addEventListener('scroll', syncNav, {passive:true});
syncNav();

// iframe 自動高度（用 body.scrollHeight + min-height:0 雙重保險）
function resizeFrame(f){
  try{
    var d = f.contentDocument || f.contentWindow.document;
    if(!d || !d.body) return;
    d.body.style.minHeight = '0';
    d.body.style.height    = 'auto';
    if(d.documentElement){
      d.documentElement.style.minHeight = '0';
      d.documentElement.style.height    = 'auto';
    }
    var h = d.body.scrollHeight;
    if(h > 100){
      f.style.height    = h + 'px';
      f.style.minHeight = '0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries = 0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries < 30) setTimeout(tick, 200);
  }
  if(f.contentDocument && f.contentDocument.readyState === 'complete'){
    tick();
  } else {
    f.addEventListener('load', tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize', function(){
  clearTimeout(rzT);
  rzT = setTimeout(resizeAllFrames, 200);
});
// 錨點點擊防錯跳
document.addEventListener('click', function(e){
  var a = e.target;
  while(a && a.tagName !== 'A') a = a.parentElement;
  if(!a) return;
  var h = a.getAttribute('href');
  if(!h || h.charAt(0) !== '#' || h.length < 2) return;
  var id = h.substring(1);
  var el = document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect = el.getBoundingClientRect();
    var y = window.scrollY + rect.top - 20;
    window.scrollTo({top:y, behavior:'smooth'});
  }, 60);
}, true);
// 前 15 秒持續輪詢
var _rt=0, _riv=setInterval(function(){
  _rt++; resizeAllFrames();
  if(_rt > 50) clearInterval(_riv);
}, 300);

// 防複製
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
  document.addEventListener(ev, function(e){e.preventDefault();return false;}, true);
});
document.addEventListener('keydown', function(e){
  var k=e.key;
  if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){e.preventDefault();}
  if(k==='F12')e.preventDefault();
  if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K'))e.preventDefault();
}, true);
setInterval(function(){
  if(window.getSelection) try{window.getSelection().removeAllRanges();}catch(e){}
}, 300);
</script>
</body></html>
